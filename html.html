<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Smooth Timeline</title>


<style>

*{
box-sizing:border-box;
}


body{
margin:0;
background:#eae8e3;
font-family:sans-serif;
overflow-x:hidden;
}



.timeline{

position:relative;
width:420px;
height:1100px;
margin:auto;

}



canvas{

position:absolute;
width:420px;
height:1100px;

}



#marker{

position:absolute;

width:36px;
height:58px;

will-change:transform;

z-index:5;

}



.pin{

width:36px;
height:36px;

background:#444;

border-radius:50% 50% 50% 0;

transform:rotate(-45deg);

}



.pin span{

display:block;

width:10px;
height:10px;

background:white;

border-radius:50%;

position:absolute;

left:13px;
top:13px;

}





.event{

position:absolute;

width:45%;

text-align:center;

transform:translateY(-50%);

}


.left{
left:0;
}


.right{
right:0;
}



h2{

margin:0;

font-size:44px;

color:#d1cdc7;

}



p{

font-size:16px;

line-height:1.4;

}



.btn{

background:white;

padding:10px 25px;

border-radius:5px;

text-decoration:none;

color:#333;

}





</style>

</head>


<body>



<div class="timeline" id="timeline">


<canvas id="canvas"
width="420"
height="1100">
</canvas>



<div id="marker">

<div class="pin">
<span></span>
</div>

</div>





<div class="event left" data-pos=".15">

<h2>15:00</h2>

<p>
Церемония<br>
<strong>Собор</strong>
</p>

<a class="btn">Карта</a>

</div>



<div class="event right" data-pos=".40">

<h2>16:30</h2>

<p>
Гости<br>
<strong>Ресторан</strong>
</p>

<a class="btn">Карта</a>

</div>



<div class="event left" data-pos=".65">

<h2>18:00</h2>

<p>
Ужин<br>
<strong>Банкет</strong>
</p>

<a class="btn">Карта</a>

</div>



<div class="event right" data-pos=".88">

<h2>22:00</h2>

<p>
Финал<br>
<strong>Вечер</strong>
</p>

<a class="btn">Карта</a>

</div>



</div>





<script>


const canvas=document.querySelector("#canvas");
const ctx=canvas.getContext("2d");


const marker=document.querySelector("#marker");
const timeline=document.querySelector("#timeline");




// создаём кривую


function bezier(t,p0,p1,p2,p3){

return {

x:
(1-t)**3*p0.x+
3*(1-t)**2*t*p1.x+
3*(1-t)*t*t*p2.x+
t**3*p3.x,


y:
(1-t)**3*p0.y+
3*(1-t)**2*t*p1.y+
3*(1-t)*t*t*p2.y+
t**3*p3.y

};

}



const segments=[

[
{x:210,y:40},
{x:80,y:180},
{x:340,y:300},
{x:210,y:450}
],

[
{x:210,y:450},
{x:80,y:600},
{x:340,y:720},
{x:210,y:850}
],

[
{x:210,y:850},
{x:150,y:950},
{x:260,y:1020},
{x:210,y:1060}
]

];




const points=[];



segments.forEach(seg=>{


for(let i=0;i<80;i++){

points.push(
bezier(
i/80,
seg[0],
seg[1],
seg[2],
seg[3]
)
);

}

});





// рисуем линию один раз


ctx.beginPath();

ctx.strokeStyle="white";

ctx.lineWidth=5;

ctx.setLineDash([8,12]);



points.forEach((p,i)=>{

if(i===0)
ctx.moveTo(p.x,p.y);
else
ctx.lineTo(p.x,p.y);

});


ctx.stroke();







// карточки


document.querySelectorAll(".event")
.forEach(card=>{


let pos=
Number(card.dataset.pos);


let p=
points[
Math.floor(pos*(points.length-1))
];


card.style.top=p.y+"px";


});







let target=0;

let current=0;



// только обновляем цель


window.addEventListener(
"scroll",
()=>{


const rect=
timeline.getBoundingClientRect();



target=
(
window.innerHeight/2-rect.top
)
/
timeline.offsetHeight;



target=
Math.max(
0,
Math.min(1,target)
);



},
{
passive:true
}
);








// постоянный плавный цикл


function animate(){



current +=
(target-current)*0.12;




const pos =
current*(points.length-1);



const i =
Math.floor(pos);



const mix =
pos-i;



const p1 =
points[i];


const p2 =
points[Math.min(i+1,points.length-1)];



const x =
p1.x+(p2.x-p1.x)*mix;



const y =
p1.y+(p2.y-p1.y)*mix;




marker.style.transform=
`
translate3d(
${x-18}px,
${y-36}px,
0
)
`;



requestAnimationFrame(animate);


}


animate();



</script>


</body>
</html>
