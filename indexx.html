<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение — открытие</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Great+Vibes&family=Marcellus&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #f7f2e9;
    --paper-shadow: #e9e0cf;
    --ink: #4a3826;
    --ink-soft: #8a7357;
    --gold: #b4884a;
    --gold-dark: #8a6432;
    --gold-light: #d9b878;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background:#20180f;
    font-family:'Marcellus', serif;
    -webkit-font-smoothing:antialiased;
  }
  body{
    display:flex; align-items:center; justify-content:center;
    min-height:100vh;
  }

  .phone{
    position:relative;
    width:390px;
    max-width:100vw;
    height:844px;
    max-height:100vh;
    background:var(--paper);
    overflow:hidden;
    box-shadow:0 40px 80px rgba(0,0,0,.5);
  }
  @media (max-width:420px){
    .phone{ width:100vw; height:100vh; }
  }

  /* subtle paper texture */
  .phone::before{
    content:"";
    position:absolute; inset:0;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(0,0,0,.03), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(0,0,0,.03), transparent 40%);
    pointer-events:none;
    z-index:1;
  }

  /* ---------- SCENE 1: names + date, revealed behind envelope ---------- */
  .heading{
    position:absolute;
    top:11%;
    left:0; right:0;
    text-align:center;
    color:var(--ink);
    z-index:2;
    opacity:0;
    animation: fadeIn 900ms ease forwards 200ms;
  }
  .heading .names{
    font-family:'Cormorant Garamond', serif;
    font-weight:500;
    font-size:34px;
    letter-spacing:.5px;
    margin:0 0 8px;
  }
  .heading .date{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:20px;
    color:var(--ink-soft);
    margin:0;
    letter-spacing:1px;
  }

  .subtext{
    position:absolute;
    bottom:9%;
    left:0; right:0;
    text-align:center;
    color:var(--ink-soft);
    font-family:'Cormorant Garamond', serif;
    font-size:15px;
    line-height:1.6;
    letter-spacing:.5px;
    z-index:2;
    opacity:0;
    animation: fadeIn 900ms ease forwards 400ms;
  }

  /* ---------- ENVELOPE FLAPS ---------- */
  .envelope{
    position:absolute;
    inset:0;
    z-index:3;
  }
  .flap{
    position:absolute;
    background:var(--paper);
  }
  .flap::after{ /* fold shadow line */
    content:"";
    position:absolute;
    background:linear-gradient(var(--flap-dir,0deg), rgba(0,0,0,0), rgba(0,0,0,.06));
  }

  .flap-top{
    top:-6%; left:-6%; right:-6%; height:64%;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin:50% 0%;
  }
  .flap-bottom{
    bottom:-6%; left:-6%; right:-6%; height:64%;
    clip-path: polygon(0 100%, 100% 100%, 50% 0);
    transform-origin:50% 100%;
  }
  .flap-left{
    top:-6%; bottom:-6%; left:-6%; width:56%;
    clip-path: polygon(0 0, 0 100%, 100% 50%);
    transform-origin:0% 50%;
  }
  .flap-right{
    top:-6%; bottom:-6%; right:-6%; width:56%;
    clip-path: polygon(100% 0, 100% 100%, 0 50%);
    transform-origin:100% 50%;
  }

  .phone.opened .flap-top{    animation: openTop 900ms cubic-bezier(.65,0,.35,1) forwards; }
  .phone.opened .flap-bottom{ animation: openBottom 900ms cubic-bezier(.65,0,.35,1) forwards; }
  .phone.opened .flap-left{   animation: openLeft 900ms cubic-bezier(.65,0,.35,1) forwards 50ms; }
  .phone.opened .flap-right{  animation: openRight 900ms cubic-bezier(.65,0,.35,1) forwards 50ms; }

  @keyframes openTop{ to{ transform: translateY(-115%) rotateX(8deg); opacity:0; } }
  @keyframes openBottom{ to{ transform: translateY(115%); opacity:0; } }
  @keyframes openLeft{ to{ transform: translateX(-115%); opacity:0; } }
  @keyframes openRight{ to{ transform: translateX(115%); opacity:0; } }

  /* seal */
  .seal-wrap{
    position:absolute;
    top:50%; left:50%;
width:118px; height:118px;
    transform:translate(-50%,-50%) scale(0);
    z-index:4;
    cursor:pointer;
    animation: sealIn 650ms cubic-bezier(.34,1.56,.64,1) forwards 400ms;
  }
  .phone.opened .seal-wrap{
    animation: sealIn 650ms cubic-bezier(.34,1.56,.64,1) forwards,
               sealOut 400ms ease forwards;
  }
  @keyframes sealIn{ to{ transform:translate(-50%,-50%) scale(1); } }
  @keyframes sealOut{ to{ opacity:0; transform:translate(-50%,-50%) scale(.7); } }

  /* pulsing "tap to open" hint, shown until the envelope is opened */
  .tap-hint{
    position:absolute;
    top:50%; left:50%;
    width:150px; height:150px;
    border-radius:50%;
    border:1px solid var(--gold);
    transform:translate(-50%,-50%) scale(1);
    z-index:3;
    opacity:0;
    pointer-events:none;
    animation: fadeIn 600ms ease forwards 900ms, pulse 1.8s ease-out infinite 900ms;
  }
  .phone.opened .tap-hint{ display:none; }
  @keyframes pulse{
    0%{ transform:translate(-50%,-50%) scale(1); opacity:.7; }
    100%{ transform:translate(-50%,-50%) scale(1.35); opacity:0; }
  }

  .seal{
    width:100%; height:100%; border-radius:50%;
    background:
      radial-gradient(circle at 32% 28%, var(--gold-light), var(--gold) 45%, var(--gold-dark) 78%, #6b4a22 100%);
    box-shadow:
      0 10px 18px rgba(0,0,0,.35),
      inset 0 2px 4px rgba(255,255,255,.35),
      inset 0 -6px 10px rgba(0,0,0,.35);
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .seal::before{ /* wax drips / rim texture */
    content:"";
    position:absolute; inset:6px; border-radius:50%;
    background-image:
      radial-gradient(circle at 15% 80%, rgba(0,0,0,.12) 0 2px, transparent 3px),
      radial-gradient(circle at 75% 85%, rgba(0,0,0,.10) 0 2px, transparent 3px),
      radial-gradient(circle at 85% 25%, rgba(0,0,0,.10) 0 2px, transparent 3px),
      radial-gradient(circle at 25% 15%, rgba(0,0,0,.08) 0 2px, transparent 3px);
    opacity:.6;
  }
  .seal-text{
    font-family:'Great Vibes', cursive;
    color:#f4e6c8;
    text-align:center;
    line-height:1.05;
    font-size:22px;
    text-shadow:0 1px 1px rgba(0,0,0,.4);
    transform:rotate(-4deg);
  }
  .seal-text span{ display:block; font-size:16px; }

  /* ---------- SCENE 2: revealed card ---------- */
  .reveal{
    position:absolute; inset:0;
    z-index:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:34px;
    background:var(--paper);
  }

  .photo{
    width:78%;
    aspect-ratio: 4/5;
    background-size:cover;
    background-position:center;
    box-shadow:0 18px 30px rgba(0,0,0,.18);
    opacity:0;
    transform:translateY(14px) scale(.98);
  }

  .cta{
    font-family:'Cormorant Garamond', serif;
    font-size:17px;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--paper);
    background:linear-gradient(135deg, var(--gold-light), var(--gold-dark));
    border:none;
    padding:14px 38px;
    border-radius:2px;
    cursor:pointer;
    box-shadow:0 8px 16px rgba(138,100,50,.35);
    opacity:0;
    transform:translateY(14px);
  }
  .cta:hover{ filter:brightness(1.05); }

  /* reveal timing — starts once flaps have cleared, relative to click */
  .reveal.play .photo{
    animation: riseIn 700ms ease forwards 750ms;
  }
  .reveal.play .cta{
    animation: riseIn 700ms ease forwards 950ms;
  }
  @keyframes riseIn{ to{ opacity:1; transform:translateY(0) scale(1); } }
  @keyframes fadeIn{ to{ opacity:1; } }

  /* replay button */
  .replay{
    position:absolute;
    bottom:22px; right:22px;
    z-index:10;
    width:44px; height:44px;
    border-radius:50%;
    border:1px solid var(--gold);
    background:rgba(247,242,233,.9);
    color:var(--gold-dark);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    font-size:18px;
    box-shadow:0 4px 10px rgba(0,0,0,.15);
  }
  .replay:hover{ background:var(--paper); }
</style>
</head>
<body>

<div class="phone" id="phone">

  <!-- Scene 2 sits underneath, revealed once the flaps move away -->
<div class="reveal" id="reveal">
    <div class="photo" style="background-image:url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=800&auto=format&fit=crop');"></div>
    <button class="cta" id="cta">Подробнее</button>
  </div>

  <!-- Scene 1: names/date + envelope with wax seal, sits on top and animates away -->
  <div class="heading">
    <p class="names">Анна &amp; Давид</p>
    <p class="date">15 / 09 / 2026</p>
  </div>
  <div class="subtext">Нажми на конверт,<br>чтобы открыть</div>

  <div class="envelope" id="envelope">
    <div class="flap flap-top"></div>
    <div class="flap flap-bottom"></div>
    <div class="flap flap-left"></div>
    <div class="flap flap-right"></div>
  </div>

  <div class="tap-hint"></div>

  <div class="seal-wrap" id="sealWrap">
    <div class="seal">
      <div class="seal-text">Анна<span>&amp; Давид</span></div>
    </div>
  </div>

  <button class="replay" id="replay" title="Повторить">⟳</button>
</div>

<script>
  const reveal = document.getElementById('reveal');
  const phone = document.getElementById('phone');
  const replay = document.getElementById('replay');
  let opened = false;

  function open(){
    if (opened) return;
    opened = true;
    phone.classList.add('opened');
    reveal.classList.add('play');
  }

  function reset(){
    opened = false;
    phone.classList.remove('opened');
    reveal.classList.remove('play');
    // force reflow so animations can run again from a clean state
    void phone.offsetWidth;
  }

  // tapping anywhere on the closed envelope opens it
  phone.addEventListener('click', (e)=>{
    if (e.target.closest('.replay')) return;
    open();
  });

  replay.addEventListener('click', (e)=>{
    e.stopPropagation();
    reset();
  });
</script>

</body>
</html>
